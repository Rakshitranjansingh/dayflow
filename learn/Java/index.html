<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Java Development — BeCreator Learn</title>
<style>
  :root {
    --bg: #F8F8F6; --surface: #FFFFFF; --surface2: #F2F2F0;
    --border: #E8E8E4; --text: #1A1A18; --text2: #6B6B65; --text3: #A8A8A0;
    --accent: #2D6BE4; --accent-soft: #EBF1FD;
    --green: #22C55E; --green-soft: #DCFCE7;
    --orange: #F97316; --orange-soft: #FFEDD5;
    --java: #f89820;
    --radius: 14px; --radius-sm: 8px;
    --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

  /* HEADER */
  .header { background: var(--surface); padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; background: var(--accent-soft); border: none; font-family: var(--font); padding: 5px 10px; border-radius: var(--radius-sm); }
  .header-title { font-size: 17px; font-weight: 700; flex: 1; }
  .header-row2 { display: flex; align-items: center; justify-content: space-between; }
  .header-sub { font-size: 12px; color: var(--text3); }
  .header-streak { font-size: 12px; color: var(--orange); font-weight: 600; }

  /* HERO BANNER */
  .course-hero { background: var(--surface); padding: 24px 20px; color: var(--text); border-bottom: 1px solid var(--border); }
  .course-hero-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--orange); }
  .course-hero-sub { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
  .progress-wrap { background: var(--border); border-radius: 4px; height: 6px; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 4px; transition: width 0.5s; }
  .progress-text { font-size: 12px; color: var(--text2); }

  /* SECTION */
  .section { padding: 16px 20px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* LESSON CARD */
  .lesson-card { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .lesson-card:active { background: var(--surface2); transform: scale(0.98); }
  .lesson-card.locked { opacity: 0.45; cursor: not-allowed; }
  .lesson-card.completed { border-color: var(--green); }
  .lesson-status { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .status-done { background: var(--green-soft); }
  .status-active { background: var(--accent-soft); }
  .status-locked { background: var(--surface2); }
  .lesson-info { flex: 1; }
  .lesson-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .lesson-meta { display: flex; gap: 8px; font-size: 11px; color: var(--text3); }
  .lesson-tag { padding: 2px 6px; border-radius: 6px; background: var(--surface2); }
  .lesson-tag.video { background: var(--orange-soft); color: var(--orange); }
  .lesson-tag.audio { background: var(--accent-soft); color: var(--accent); }
  .lesson-tag.quiz { background: var(--green-soft); color: var(--green); }
  .lesson-arrow { font-size: 14px; color: var(--text3); }

  /* QUIZ CARD */
  .quiz-card { background: var(--surface); border-radius: var(--radius-sm); border: 1.5px solid var(--accent); padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .quiz-card:active { opacity: 0.8; }
  .quiz-card.locked { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }
  .quiz-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .quiz-info { flex: 1; }
  .quiz-title { font-size: 14px; font-weight: 600; color: var(--accent); }
  .quiz-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .quiz-score { font-size: 13px; font-weight: 700; color: var(--green); }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; }
  .bottom-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; }
  .btn-becreator { background: var(--surface2); color: var(--text); }
  .btn-resume { background: var(--java); color: #fff; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row1">
    <a class="back-btn" href="../../index.html?page=learn">← Courses</a>
    <div class="header-title">☕ Java Development</div>
  </div>
  <div class="header-row2">
    <span class="header-sub" id="hdr-progress">0 of 12 lessons complete</span>
    <span class="header-streak" id="hdr-streak"></span>
  </div>
</div>

<!-- HERO -->
<div class="course-hero">
  <div class="course-hero-title">Java Development</div>
  <div class="course-hero-sub">From zero to confident Java developer</div>
  <div class="progress-wrap">
    <div class="progress-fill" id="hero-progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="hero-progress-text">0% complete</div>
</div>

<!-- BEGINNER -->
<div class="section">
  <div class="section-title">🟢 Beginner</div>
  <div id="beginner-lessons"></div>
</div>

<!-- INTERMEDIATE -->
<div class="section">
  <div class="section-title">🟡 Intermediate</div>
  <div id="intermediate-lessons"></div>
</div>

<!-- ADVANCED -->
<div class="section">
  <div class="section-title">🔴 Advanced</div>
  <div id="advanced-lessons"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bottom-btn btn-becreator" onclick="window.location.href='../../index.html'">Courses</button>
  <button class="bottom-btn btn-resume" id="resume-btn" onclick="resumeLearning()">▶ Resume Learning</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// COURSE CONTENT — Edit lessons here
// ============================================================
const COURSE = {
  id: 'java',
  totalLessons: 12,
  sections: [
    {
      id: 'beginner',
      title: 'Beginner',
      lessons: [
        {
          id: 'what-is-java',
          no: 1,
          title: 'What is Java?',
          duration: '8 min',
          types: ['video', 'notes'],
          file: 'lessons/01-what-is-java.html'
        },
        {
          id: 'setup',
          no: 2,
          title: 'Setup & Hello World',
          duration: '10 min',
          types: ['video', 'notes'],
          file: 'lessons/02-setup.html'
        },
        {
          id: 'variables',
          no: 3,
          title: 'Variables & Data Types',
          duration: '12 min',
          types: ['video', 'audio', 'notes'],
          file: 'lessons/03-variables.html'
        },
        {
          id: 'operators',
          no: 4,
          title: 'Operators & Expressions',
          duration: '10 min',
          types: ['video', 'notes'],
          file: 'lessons/04-operators.html'
        },
        {
          id: 'quiz-1',
          no: null,
          title: 'Quiz 1 — Java Basics',
          duration: '5 questions',
          types: ['quiz'],
          file: 'quizzes/quiz-1.html',
          isQuiz: true,
          requiresLessons: ['what-is-java','setup','variables','operators']
        }
      ]
    },
    {
      id: 'intermediate',
      title: 'Intermediate',
      lessons: [
        {
          id: 'conditions',
          no: 5,
          title: 'Conditions & If-Else',
          duration: '11 min',
          types: ['video', 'notes'],
          file: 'lessons/05-conditions.html'
        },
        {
          id: 'loops',
          no: 6,
          title: 'Loops & Iteration',
          duration: '13 min',
          types: ['video', 'audio', 'notes'],
          file: 'lessons/06-loops.html'
        },
        {
          id: 'arrays',
          no: 7,
          title: 'Arrays',
          duration: '12 min',
          types: ['video', 'notes'],
          file: 'lessons/07-arrays.html'
        },
        {
          id: 'methods',
          no: 8,
          title: 'Methods & Functions',
          duration: '14 min',
          types: ['video', 'audio', 'notes'],
          file: 'lessons/08-methods.html'
        },
        {
          id: 'quiz-2',
          no: null,
          title: 'Quiz 2 — Intermediate',
          duration: '8 questions',
          types: ['quiz'],
          file: 'quizzes/quiz-2.html',
          isQuiz: true,
          requiresLessons: ['conditions','loops','arrays','methods']
        }
      ]
    },
    {
      id: 'advanced',
      title: 'Advanced',
      lessons: [
        {
          id: 'oop',
          no: 9,
          title: 'OOP — Classes & Objects',
          duration: '16 min',
          types: ['video', 'notes'],
          file: 'lessons/09-oop.html'
        },
        {
          id: 'inheritance',
          no: 10,
          title: 'Inheritance & Polymorphism',
          duration: '14 min',
          types: ['video', 'audio', 'notes'],
          file: 'lessons/10-inheritance.html'
        },
        {
          id: 'exceptions',
          no: 11,
          title: 'Exception Handling',
          duration: '11 min',
          types: ['video', 'notes'],
          file: 'lessons/11-exceptions.html'
        },
        {
          id: 'collections',
          no: 12,
          title: 'Collections & ArrayList',
          duration: '13 min',
          types: ['video', 'notes'],
          file: 'lessons/12-collections.html'
        },
        {
          id: 'quiz-3',
          no: null,
          title: 'Quiz 3 — Final Assessment',
          duration: '10 questions',
          types: ['quiz'],
          file: 'quizzes/quiz-3.html',
          isQuiz: true,
          requiresLessons: ['oop','inheritance','exceptions','collections']
        }
      ]
    }
  ]
};

// ============================================================
// STATE
// ============================================================
const DB_KEY = 'becreator_v1';
function loadState() {
  try {
    let s = localStorage.getItem(DB_KEY);
    if (!s) {
      s = localStorage.getItem('dayflow_v1');
      if (s) localStorage.setItem(DB_KEY, s);
    }
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}
function saveState(s) { try { localStorage.setItem(DB_KEY, JSON.stringify(s)); } catch(e) {} }

let state = loadState();
if (!state.learning) state.learning = { enrollments: {} };
if (!state.learning.enrollments) state.learning.enrollments = {};
if (!state.learning.enrollments.java) {
  // Redirect to learn hub if not enrolled
  window.location.href = '../../index.html?page=learn';
}

const enrollment = state.learning.enrollments.java;

// ============================================================
// RENDER
// ============================================================
function init() {
  updateHeader();
  renderSections();
  updateResumeBtn();
}

function updateHeader() {
  const done = enrollment.completed?.length || 0;
  const total = COURSE.totalLessons;
  const pct = Math.round((done / total) * 100);
  document.getElementById('hdr-progress').textContent = `${done} of ${total} lessons complete`;
  document.getElementById('hero-progress-fill').style.width = pct + '%';
  document.getElementById('hero-progress-text').textContent = pct + '% complete';
  if (enrollment.streak > 0) {
    document.getElementById('hdr-streak').textContent = `🔥 ${enrollment.streak} day streak`;
  }
}

function renderSections() {
  COURSE.sections.forEach(section => {
    const container = document.getElementById(`${section.id}-lessons`);
    if (!container) return;
    container.innerHTML = section.lessons.map(lesson => renderLesson(lesson)).join('');
  });
}

function renderLesson(lesson) {
  const completed = enrollment.completed?.includes(lesson.id);
  const isQuiz = lesson.isQuiz;

  if (isQuiz) {
    const quizUnlocked = lesson.requiresLessons?.every(id => enrollment.completed?.includes(id));
    const score = enrollment.quizScores?.[lesson.id];
    const locked = !quizUnlocked;
    return `
      <div class="quiz-card ${locked ? 'locked' : ''}" onclick="${locked ? '' : `goToLesson('${lesson.file}')`}">
        <div class="quiz-icon">📝</div>
        <div class="quiz-info">
          <div class="quiz-title">${lesson.title}</div>
          <div class="quiz-meta">${lesson.duration} · ${locked ? '🔒 Complete lessons first' : score !== undefined ? `Last score: ` : 'Not attempted'}</div>
        </div>
        ${score !== undefined ? `<div class="quiz-score">${score}%</div>` : ''}
      </div>`;
  }

  const status = completed ? 'done' : 'active';
  const icon = completed ? '✅' : lesson.no;
  const statusClass = completed ? 'status-done' : 'status-active';

  const tags = lesson.types.map(t => `<span class="lesson-tag ${t}">${t === 'video' ? '🎬 Video' : t === 'audio' ? '🎵 Audio' : t === 'notes' ? '📝 Notes' : t}</span>`).join('');

  return `
    <div class="lesson-card ${completed ? 'completed' : ''}" onclick="goToLesson('${lesson.file}')">
      <div class="lesson-status ${statusClass}">${icon}</div>
      <div class="lesson-info">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-meta">${tags}<span>⏱️ ${lesson.duration}</span></div>
      </div>
      <div class="lesson-arrow">›</div>
    </div>`;
}

function goToLesson(file) {
  window.location.href = file;
}

function updateResumeBtn() {
  const allLessons = COURSE.sections.flatMap(s => s.lessons.filter(l => !l.isQuiz));
  const nextLesson = allLessons.find(l => !enrollment.completed?.includes(l.id));
  const btn = document.getElementById('resume-btn');
  if (nextLesson) {
    btn.textContent = `▶ ${nextLesson.title}`;
    btn.onclick = () => goToLesson(nextLesson.file);
  } else {
    btn.textContent = '🎉 Course Complete!';
    btn.style.background = 'var(--green)';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
